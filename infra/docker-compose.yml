services:
  postgres:
    image: postgres:16
    container_name: glorygames-postgres
    environment:
      POSTGRES_USER: glory
      POSTGRES_PASSWORD: glory_pw_change_me
      POSTGRES_DB: glorygames
    ports:
      - "5432:5432"
    volumes:
      - glorygames_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: glorygames-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - glorygames_redis:/data

volumes:
  glorygames_pg:
  glorygames_redis:
