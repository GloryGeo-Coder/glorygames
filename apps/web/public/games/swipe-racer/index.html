<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070b16" />
  <title>Swipe Racer</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="/sdk/gg-sdk.css" />
</head>

<body>
  <!-- Top HUD -->
  <header class="hud">
    <div class="hudLeft">
      <div class="brand" id="ggTitle">Swipe Racer</div>
      <div class="sub" id="ggSub">Swipe/drag to steer • Tap to boost</div>
    </div>

    <div class="hudRight">
      <div class="stat">
        <div class="label">Distance</div>
        <div class="value" id="distance">0</div>
      </div>
      <div class="stat">
        <div class="label">Near</div>
        <div class="value" id="near">0</div>
      </div>
      <div class="stat">
        <div class="label">Boost</div>
        <div class="value" id="boost">0</div>
      </div>
    </div>
  </header>

  <main class="stage">
    <canvas id="c"></canvas>

    <!-- Start / Pause / Game Over Panel -->
    <div class="panel" id="panel">
      <div class="panelInner">
        <div class="panelTitle" id="panelTitle">Swipe Racer</div>
        <div class="panelText" id="panelText">
          Swipe/drag to steer. Avoid traffic. Collect boost pickups and tap Boost for a burst. Near misses score bonus!
        </div>

        <div class="panelButtons">
          <button class="btn primary" id="btnStart">Start</button>
          <button class="btn" id="btnOverlay">Open Overlay</button>
        </div>

        <div class="panelHint">
          <span class="pill">Mobile-first</span>
          <span class="pill">Endless runner</span>
          <span class="pill">Near-miss bonus</span>
        </div>
      </div>
    </div>

    <!-- Bottom thumb bar -->
    <nav class="actions">
      <button class="chip" id="btnPause" aria-label="Pause">⏸</button>
      <button class="chip primary" id="btnBoost" aria-label="Boost">⚡ Boost</button>
      <button class="chip" id="btnSubmit" aria-label="Submit Score">🏆 Submit</button>
      <button class="chip" id="btnRestart" aria-label="Restart">↻</button>
      <button class="chip" id="btnChat" aria-label="Overlay / Chat">💬</button>
    </nav>
  </main>

  <script src="/sdk/gg-sdk.js"></script>
  <script src="/games/_shared/gg-sdk.js"></script>
  <script src="./game.js"></script>
</body>
</html>
