<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile-first viewport: prevents unwanted zoom/scroll inside iframe -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />

    <meta name="theme-color" content="#0b1020" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <title>Fruit Slice</title>

    <!-- Keep game styling separate going forward -->
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div class="gameShell">
      <header class="gameTop">
        <div class="titleBlock">
          <div id="ggTitle">Fruit Slice</div>
          <div id="ggSub">Swipe to slice • Avoid bombs • Chain combos</div>
        </div>

        <div class="hud" aria-label="Game stats">
          <div class="pill" title="Score">
            <span class="dot"></span>
            <span>Score</span>
            <b id="score">0</b>
          </div>

          <div class="pill" title="Lives">
            <span>❤️</span>
            <b id="lives">3</b>
          </div>

          <div class="pill" title="Combo">
            <span>⚡</span>
            <b id="level">0</b>
          </div>
        </div>
      </header>

      <main class="gameStage" id="gameStage">
        <canvas id="c" aria-label="Fruit Slice game canvas"></canvas>

        <div id="panel" class="overlay">
          <div class="card">
            <div id="panelTitle">Fruit Slice</div>

            <p id="panelText">
Swipe across the screen to slice fruit.
Avoid bombs 💣.
Chain slices quickly to build combos ⚡.

Tip: Sound unlocks on first tap.
            </p>

            <div class="row">
              <button id="btnStart" class="cta" type="button">Start</button>
              <button id="btnOverlay" class="ghost" type="button">How to Play</button>
            </div>
          </div>
        </div>

        <!-- Hidden platform compatibility buttons.
             Keep these IDs because game.js expects them. -->
        <button id="btnPause" class="hiddenCompat" type="button"></button>
        <button id="btnLaunch" class="hiddenCompat" type="button"></button>
        <button id="btnSubmit" class="hiddenCompat" type="button"></button>
        <button id="btnRestart" class="hiddenCompat" type="button"></button>
        <button id="btnChat" class="hiddenCompat" type="button"></button>
      </main>

      <footer class="gameBottom" aria-hidden="true"></footer>
    </div>

    <script src="./game.js" defer></script>
  </body>
</html>
