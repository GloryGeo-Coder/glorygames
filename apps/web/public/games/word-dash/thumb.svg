<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#060a16"></stop>
      <stop offset="0.45" stop-color="#6d28d9"></stop>
      <stop offset="1" stop-color="#1d4ed8"></stop>
    </linearGradient>

    <linearGradient id="card" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.10)"></stop>
      <stop offset="1" stop-color="rgba(255,255,255,0.05)"></stop>
    </linearGradient>

    <linearGradient id="accent" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#a855f7"></stop>
      <stop offset="1" stop-color="#3b82f6"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"></rect>
  <rect x="56" y="56" width="1088" height="563" rx="28" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.22)" stroke-width="2"></rect>

  <!-- Target card -->
  <rect x="160" y="170" width="880" height="150" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.18)" stroke-width="2"></rect>
  <rect x="180" y="190" width="220" height="38" rx="19" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="2"></rect>
  <text x="290" y="216" text-anchor="middle" font-family="system-ui,Segoe UI" font-size="18" font-weight="900" fill="rgba(255,255,255,0.78)">TARGET</text>

  <text x="600" y="278" text-anchor="middle" font-family="system-ui,Segoe UI" font-size="64" font-weight="1000" fill="rgba(255,255,255,0.92)" letter-spacing="2">GLORY</text>

  <!-- Entry card -->
  <rect x="160" y="340" width="880" height="150" rx="24" fill="url(#card)" stroke="rgba(255,255,255,0.18)" stroke-width="2"></rect>
  <rect x="180" y="360" width="220" height="38" rx="19" fill="rgba(0,0,0,0.18)" stroke="rgba(255,255,255,0.14)" stroke-width="2"></rect>
  <text x="290" y="386" text-anchor="middle" font-family="system-ui,Segoe UI" font-size="18" font-weight="900" fill="rgba(255,255,255,0.78)">YOUR WORD</text>

  <rect x="430" y="374" width="610" height="88" rx="18" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.14)" stroke-width="2"></rect>
  <text x="735" y="432" text-anchor="middle" font-family="system-ui,Segoe UI" font-size="44" font-weight="1000" fill="rgba(255,255,255,0.90)" letter-spacing="2">_____</text>

  <!-- Accent streak bar -->
  <rect x="160" y="520" width="880" height="18" rx="9" fill="rgba(255,255,255,0.14)"></rect>
  <rect x="160" y="520" width="520" height="18" rx="9" fill="url(#accent)"></rect>

  <text x="120" y="580" fill="rgba(255,255,255,0.92)" font-family="system-ui,Segoe UI" font-size="56" font-weight="900">Word Dash</text>
  <text x="120" y="632" fill="rgba(255,255,255,0.72)" font-family="system-ui,Segoe UI" font-size="24" font-weight="800">Mobile-first • Type or tap keys • Streak multipliers • Time bonus</text>
</svg>
