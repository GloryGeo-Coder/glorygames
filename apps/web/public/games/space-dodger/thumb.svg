<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b122c"></stop>
      <stop offset="0.45" stop-color="#4c1d95"></stop>
      <stop offset="1" stop-color="#0369a1"></stop>
    </linearGradient>
    <linearGradient id="ship" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#60a5fa"></stop>
      <stop offset="1" stop-color="#3b82f6"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"></rect>
  <rect x="56" y="56" width="1088" height="563" rx="28" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.22)" stroke-width="2"></rect>

  <!-- Stars -->
  <g fill="rgba(255,255,255,0.75)">
    <circle cx="160" cy="150" r="2"></circle>
    <circle cx="260" cy="250" r="1.5"></circle>
    <circle cx="400" cy="160" r="1.8"></circle>
    <circle cx="520" cy="290" r="2.2"></circle>
    <circle cx="760" cy="190" r="1.6"></circle>
    <circle cx="980" cy="210" r="2.3"></circle>
    <circle cx="980" cy="420" r="1.6"></circle>
    <circle cx="820" cy="460" r="2.1"></circle>
    <circle cx="240" cy="460" r="2.1"></circle>
    <circle cx="420" cy="520" r="1.7"></circle>
  </g>

  <!-- Asteroids -->
  <g>
    <circle cx="860" cy="360" r="44" fill="rgba(239,68,68,0.85)"></circle>
    <circle cx="860" cy="360" r="22" fill="rgba(0,0,0,0.20)"></circle>
    <circle cx="980" cy="460" r="28" fill="rgba(239,68,68,0.75)"></circle>
    <circle cx="980" cy="460" r="14" fill="rgba(0,0,0,0.18)"></circle>
  </g>

  <!-- Ship -->
  <g transform="translate(360 410)">
    <path d="M0,-70 L44,62 L0,36 L-44,62 Z" fill="url(#ship)" opacity="0.95"></path>
    <ellipse cx="0" cy="-16" rx="11" ry="18" fill="rgba(255,255,255,0.20)"></ellipse>
    <path d="M0,62 L12,106 L-12,106 Z" fill="rgba(168,85,247,0.82)"></path>
  </g>

  <text x="120" y="190" fill="rgba(255,255,255,0.92)" font-family="system-ui,Segoe UI" font-size="58" font-weight="900">Space Dodger</text>
  <text x="120" y="260" fill="rgba(255,255,255,0.72)" font-family="system-ui,Segoe UI" font-size="26" font-weight="700">Mobile-first • Drag to move • Tap to dash</text>
  <text x="120" y="320" fill="rgba(255,255,255,0.60)" font-family="system-ui,Segoe UI" font-size="20" font-weight="600">Dodge asteroids, collect stars, submit your score.</text>
</svg>
