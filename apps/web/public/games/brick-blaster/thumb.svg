<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0b122c"></stop>
      <stop offset="0.45" stop-color="#4c1d95"></stop>
      <stop offset="1" stop-color="#0369a1"></stop>
    </linearGradient>

    <linearGradient id="brickA" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3b82f6"></stop>
      <stop offset="1" stop-color="#a855f7"></stop>
    </linearGradient>

    <linearGradient id="brickB" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22c55e"></stop>
      <stop offset="1" stop-color="#0ea5e9"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"></rect>
  <rect x="56" y="56" width="1088" height="563" rx="28" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.22)" stroke-width="2"></rect>

  <!-- Bricks -->
  <g>
    <rect x="140" y="150" width="120" height="38" rx="10" fill="url(#brickA)"></rect>
    <rect x="272" y="150" width="120" height="38" rx="10" fill="url(#brickB)"></rect>
    <rect x="404" y="150" width="120" height="38" rx="10" fill="url(#brickA)"></rect>
    <rect x="536" y="150" width="120" height="38" rx="10" fill="url(#brickB)"></rect>
    <rect x="668" y="150" width="120" height="38" rx="10" fill="url(#brickA)"></rect>
    <rect x="800" y="150" width="120" height="38" rx="10" fill="url(#brickB)"></rect>

    <rect x="200" y="204" width="120" height="38" rx="10" fill="url(#brickB)"></rect>
    <rect x="332" y="204" width="120" height="38" rx="10" fill="url(#brickA)"></rect>
    <rect x="464" y="204" width="120" height="38" rx="10" fill="url(#brickB)"></rect>
    <rect x="596" y="204" width="120" height="38" rx="10" fill="url(#brickA)"></rect>
    <rect x="728" y="204" width="120" height="38" rx="10" fill="url(#brickB)"></rect>
  </g>

  <!-- Ball -->
  <circle cx="600" cy="360" r="22" fill="rgba(168,85,247,0.92)"></circle>
  <circle cx="600" cy="360" r="10" fill="rgba(255,255,255,0.22)"></circle>

  <!-- Paddle -->
  <rect x="440" y="500" width="320" height="26" rx="13" fill="rgba(59,130,246,0.95)"></rect>

  <!-- Power-ups -->
  <g>
    <circle cx="360" cy="410" r="16" fill="rgba(34,197,94,0.92)"></circle>
    <text x="360" y="416" text-anchor="middle" font-family="system-ui,Segoe UI" font-size="16" font-weight="900" fill="rgba(0,0,0,0.55)">W</text>

    <circle cx="840" cy="410" r="16" fill="rgba(14,165,233,0.92)"></circle>
    <text x="840" y="416" text-anchor="middle" font-family="system-ui,Segoe UI" font-size="16" font-weight="900" fill="rgba(0,0,0,0.55)">S</text>
  </g>

  <text x="120" y="580" fill="rgba(255,255,255,0.92)" font-family="system-ui,Segoe UI" font-size="56" font-weight="900">Brick Blaster</text>
  <text x="120" y="632" fill="rgba(255,255,255,0.72)" font-family="system-ui,Segoe UI" font-size="24" font-weight="800">Mobile-first • Drag paddle • Tap to launch • Power-ups</text>
</svg>
