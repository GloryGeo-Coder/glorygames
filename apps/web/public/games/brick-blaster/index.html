<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#070b16" />
  <title>Brick Blaster</title>

  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="/sdk/gg-sdk.css" />
</head>

<body>
  <!-- Top HUD -->
  <header class="hud">
    <div class="hudLeft">
      <div class="brand" id="ggTitle">Brick Blaster</div>
      <div class="sub" id="ggSub">Drag paddle • Tap to launch</div>
    </div>

    <div class="hudRight">
      <div class="stat">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">Lives</div>
        <div class="value" id="lives">3</div>
      </div>
      <div class="stat">
        <div class="label">Level</div>
        <div class="value" id="level">1</div>
      </div>
    </div>
  </header>

  <main class="stage">
    <canvas id="c"></canvas>

    <!-- Start / Pause / Game Over Panel -->
    <div class="panel" id="panel">
      <div class="panelInner">
        <div class="panelTitle" id="panelTitle">Brick Blaster</div>
        <div class="panelText" id="panelText">
          Drag to move the paddle. Tap to launch the ball. Clear bricks, grab power-ups, and chase the leaderboard.
        </div>

        <div class="panelButtons">
          <button class="btn primary" id="btnStart">Start</button>
          <button class="btn" id="btnOverlay">Open Overlay</button>
        </div>

        <div class="panelHint">
          <span class="pill">Mobile-first</span>
          <span class="pill">Touch + Mouse</span>
          <span class="pill">Power-ups</span>
        </div>
      </div>
    </div>

    <!-- Bottom thumb bar -->
    <nav class="actions">
      <button class="chip" id="btnPause" aria-label="Pause">⏸</button>
      <button class="chip" id="btnLaunch" aria-label="Launch Ball">🚀 Launch</button>
      <button class="chip" id="btnSubmit" aria-label="Submit Score">🏆 Submit</button>
      <button class="chip" id="btnRestart" aria-label="Restart">↻</button>
      <button class="chip" id="btnChat" aria-label="Overlay / Chat">💬</button>
    </nav>
  </main>

  <script src="/sdk/gg-sdk.js"></script>
  <script src="/games/_shared/gg-sdk.js"></script>
  <script src="./game.js"></script>
</body>
</html>
