<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <meta name="theme-color" content="#060a16" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Brick Blaster</title>
  <link rel="stylesheet" href="./styles.css" />
  <link rel="stylesheet" href="/sdk/gg-sdk.css" />
</head>
<body>
  <header class="hud">
    <div class="hudLeft">
      <div class="brand" id="ggTitle">Brick Blaster</div>
      <div class="sub" id="ggSub">Drag paddle • Tap to launch • Catch power-ups</div>
    </div>

    <div class="hudRight">
      <div class="stat">
        <div class="label">Score</div>
        <div class="value" id="score">0</div>
      </div>
      <div class="stat">
        <div class="label">Lives</div>
        <div class="value" id="lives">3</div>
      </div>
      <div class="stat">
        <div class="label">Level</div>
        <div class="value" id="level">1</div>
      </div>
    </div>
  </header>

  <main class="stage">
    <canvas id="c" tabindex="0" aria-label="Brick Blaster game canvas"></canvas>

    <div class="panel" id="panel">
      <div class="panelInner">
        <div class="panelEyebrow">WebGameArena</div>
        <div class="panelTitle" id="panelTitle">Brick Blaster</div>
        <div class="panelText" id="panelText">
          Drag anywhere to move the paddle. Tap to launch. Break glowing bricks, chain combos, grab power-ups, and submit your best score.
        </div>

        <div class="panelButtons">
          <button class="btn primary" id="btnStart">Start</button>
          <button class="btn" id="btnOverlay">Leaderboard</button>
        </div>

        <div class="panelHint">
          <span class="pill">Mobile-first</span>
          <span class="pill">Combo scoring</span>
          <span class="pill">Multi-ball</span>
          <span class="pill">Power-ups</span>
        </div>
      </div>
    </div>

    <nav class="actions" aria-label="Game actions">
      <button class="chip" id="btnPause" aria-label="Pause or resume">⏸ Pause</button>
      <button class="chip primaryChip" id="btnLaunch" aria-label="Launch Ball">🚀 Launch</button>
      <button class="chip" id="btnSubmit" aria-label="Submit Score">🏆 Submit</button>
      <button class="chip" id="btnRestart" aria-label="Restart">↻ Restart</button>
      <button class="chip" id="btnChat" aria-label="Overlay or Chat">💬</button>
    </nav>
  </main>

  <script src="/sdk/gg-sdk.js"></script>
  <script src="/games/_shared/gg-sdk.js"></script>
  <script src="./game.js"></script>
</body>
</html>
