<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#061022"></stop>
      <stop offset="0.45" stop-color="#14532d"></stop>
      <stop offset="1" stop-color="#1d4ed8"></stop>
    </linearGradient>

    <linearGradient id="tower" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#22c55e"></stop>
      <stop offset="1" stop-color="#3b82f6"></stop>
    </linearGradient>

    <linearGradient id="tower2" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#a855f7"></stop>
      <stop offset="1" stop-color="#0ea5e9"></stop>
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"></rect>
  <rect x="56" y="56" width="1088" height="563" rx="28" fill="rgba(0,0,0,0.22)" stroke="rgba(255,255,255,0.22)" stroke-width="2"></rect>

  <!-- Tower blocks -->
  <g>
    <rect x="430" y="420" width="340" height="32" rx="12" fill="rgba(255,255,255,0.12)"></rect>
    <rect x="450" y="378" width="300" height="32" rx="12" fill="url(#tower)"></rect>
    <rect x="472" y="336" width="256" height="32" rx="12" fill="url(#tower2)"></rect>
    <rect x="495" y="294" width="210" height="32" rx="12" fill="url(#tower)"></rect>
    <rect x="520" y="252" width="160" height="32" rx="12" fill="url(#tower2)"></rect>
    <rect x="548" y="210" width="104" height="32" rx="12" fill="url(#tower)"></rect>
  </g>

  <!-- Dropping block -->
  <rect x="510" y="150" width="180" height="32" rx="12" fill="rgba(34,197,94,0.92)"></rect>
  <rect x="514" y="154" width="172" height="12" rx="8" fill="rgba(255,255,255,0.22)"></rect>

  <!-- Center guide -->
  <line x1="600" y1="120" x2="600" y2="520" stroke="rgba(255,255,255,0.22)" stroke-dasharray="10 14"></line>

  <text x="120" y="580" fill="rgba(255,255,255,0.92)" font-family="system-ui,Segoe UI" font-size="56" font-weight="900">Stack Tower</text>
  <text x="120" y="632" fill="rgba(255,255,255,0.72)" font-family="system-ui,Segoe UI" font-size="24" font-weight="800">Mobile-first • Tap to drop • Perfect stacks = combo</text>
</svg>
